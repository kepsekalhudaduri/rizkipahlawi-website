<!-- Contact Section -->
<section id="contact" class="py-24 bg-white/50 border-t border-brand-primary/5 px-6">
  <div class="max-w-6xl mx-auto grid md:grid-cols-12 gap-12">
    <!-- Info Column -->
    <div class="md:col-span-5 space-y-8">
      <div class="space-y-4">
        <h2 class="font-heading text-3xl font-bold text-brand-primary">Hubungi Saya</h2>
        <p class="text-brand-secondary/80 text-sm leading-relaxed">
          Silakan kirimkan pesan, pertanyaan, atau ajakan kolaborasi strategis melalui formulir di samping, atau hubungi saya secara langsung melalui kontak resmi di bawah ini.
        </p>
        <div class="w-12 h-1 bg-brand-accent"></div>
      </div>

      <div class="space-y-4 text-sm">
        <a href="https://wa.me/6282125286753" target="_blank" rel="noopener" class="flex items-center gap-3 text-brand-secondary hover:text-brand-accent transition-colors">
          <div class="w-9 h-9 rounded bg-brand-primary/5 flex items-center justify-center">
            <i data-lucide="phone" class="w-4 h-4"></i>
          </div>
          <span>+62 821-2528-6753 (WhatsApp)</span>
        </a>
        <a href="mailto:admin@rizkipahlawi.my.id" class="flex items-center gap-3 text-brand-secondary hover:text-brand-accent transition-colors">
          <div class="w-9 h-9 rounded bg-brand-primary/5 flex items-center justify-center">
            <i data-lucide="mail" class="w-4 h-4"></i>
          </div>
          <span>admin@rizkipahlawi.my.id</span>
        </a>
        <a href="https://www.instagram.com/r_pahlawi?igsh=eGhmM3B5ZGM1cWUx" target="_blank" rel="noopener" class="flex items-center gap-3 text-brand-secondary hover:text-brand-accent transition-colors">
          <div class="w-9 h-9 rounded bg-brand-primary/5 flex items-center justify-center">
            <i data-lucide="instagram" class="w-4 h-4"></i>
          </div>
          <span>@r_pahlawi</span>
        </a>
      </div>
    </div>

    <!-- Form Column -->
    <div class="md:col-span-7 bg-white p-8 rounded border border-brand-primary/5 shadow-sm" x-data="contactForm()">
      <form @submit.prevent="submitForm" class="space-y-6">
        <div>
          <label for="nama" class="block text-xs font-semibold uppercase tracking-wider text-brand-secondary mb-2">Nama Lengkap</label>
          <input type="text" id="nama" x-model="formData.nama" required class="w-full px-4 py-3 bg-brand-bg border border-brand-primary/10 rounded focus:outline-none focus:border-brand-accent text-sm transition-colors" placeholder="Masukkan nama lengkap Anda">
        </div>
        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-brand-secondary mb-2">Alamat Email</label>
          <input type="email" id="email" x-model="formData.email" required class="w-full px-4 py-3 bg-brand-bg border border-brand-primary/10 rounded focus:outline-none focus:border-brand-accent text-sm transition-colors" placeholder="nama@perusahaan.com">
        </div>
        <div>
          <label for="pesan" class="block text-xs font-semibold uppercase tracking-wider text-brand-secondary mb-2">Pesan Anda</label>
          <textarea id="pesan" x-model="formData.pesan" required rows="4" class="w-full px-4 py-3 bg-brand-bg border border-brand-primary/10 rounded focus:outline-none focus:border-brand-accent text-sm transition-colors" placeholder="Tuliskan pesan atau detail kolaborasi yang Anda inginkan..."></textarea>
        </div>
        <button type="submit" :disabled="loading" class="w-full py-3 bg-brand-primary hover:bg-brand-secondary text-white font-medium text-sm rounded transition-all flex items-center justify-center gap-2 disabled:opacity-50">
          <span x-show="!loading">Kirim Pesan</span>
          <span x-show="loading" class="flex items-center gap-2" x-cloak>
            <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Mengirim...
          </span>
        </button>
      </form>
    </div>
  </div>
</section>
